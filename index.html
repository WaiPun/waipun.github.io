<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {font-family: Arial;}

/* Style the tab */
.tab {
  overflow: hidden;
  border: 1px solid #ccc;
  background-color: #f1f1f1;
}

/* Style the buttons inside the tab */
.tab button {
  background-color: inherit;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 14px 16px;
  transition: 0.3s;
  font-size: 17px;
}

/* Change background color of buttons on hover */
.tab button:hover {
  background-color: #ddd;
}

/* Create an active/current tablink class */
.tab button.active {
  background-color: #ccc;
}

/* Style the tab content */
.tabcontent {
  display: none;
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-top: none;
}
</style>
</head>
<body>

<h2>Joanna & Thomas 20 Sept 2020</h2>
<p>Thank You</p>

<div class="tab">
  <button class="tablinks" onclick="openCity(event, 'London')" id="defaultOpen">AM Rundown</button>
  <button class="tablinks" onclick="openCity(event, 'Paris')">PM Rundowm</button>
  <button class="tablinks" onclick="openCity(event, 'Tokyo')">Contacts</button>
</div>

<div id="London" class="tabcontent">
    <iframe src="AM.html" style="height: 800px; width: 100%" id = "textArea" ></iframe>
</div>

<div id="Paris" class="tabcontent">
    <iframe src="PM.html" style="height: 800px; width: 100%" id = "textArea"></iframe>
</div>

<div id="Tokyo" class="tabcontent">
    <iframe src="Contacts.html" style="height: 800px; width: 100%" id = "textArea"></iframe>
</div>

<script>
function openCity(evt, cityName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(cityName).style.display = "block";
  evt.currentTarget.className += " active";
}
document.getElementById("defaultOpen").click();
</script>
   
</body>
</html>
