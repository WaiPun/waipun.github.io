  function Search_query_Q() {
  var input, filter, table, tr, td, i, txtValue;
  input = document.getElementById("SearchBar");
  filter = input.value.toUpperCase();
  table = document.getElementById("QTable");
  tr = table.getElementsByTagName("tr");

        txtValue = td.textContent || td.innerText;

  function searchtext(txt){
  document.getElementById("SearchBar").value = txt;
  Search_query();
  }

  function matching(str, patt1) {

  patt1 = patt1.toUpperCase();
  str = str.toUpperCase();
  patt1 = textSplit(patt1);

  var count_matches = 0;
  var result = "";
  var i;

  for (i = 0; i < patt1.length; i++) {
    if(str.indexOf(patt1[i]) > -1){
      count_matches = count_matches + 1;
    }
  }

  var str_split = textSplit(str);
  var result = 0;

  if(count_matches == Math.min(patt1.length, str_split.length)){result = 1;}else{result = -1;}

  return result;

  }

  function textSplit(txt){
    txt = txt.replace(/[.|&|,]/g," ");
    txt = txt.replace(/\s+/g," ");
    txt = txt.split(" ");
    txt = txt.filter(onlyUnique);
    return txt
  }

  function onlyUnique(value, index, self) { 
    return self.indexOf(value) === index;
  }
